services:
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    networks:
      - frontend-nw
        
  db:
    image: postgres:16-alpine
    networks:
      - backend-nw
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: slnd_admin
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: slnd_db
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    networks:
      - frontend-nw
    depends_on:
      - api-gateway

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    networks:
      - frontend-nw
      - backend-nw
    env_file:
      - ./services/api-gateway/.env
    environment:
      - HOST=0.0.0.0
      - ID_SERVICE_URL=http://id-service:4601
      - AI_AGENT_SERVICE_URL=http://ai-agent-service:4602
    depends_on:
      - id-service
      - ai-agent-service

  id-service:
    build:
      context: .
      dockerfile: services/id-service/Dockerfile
    networks:
      - backend-nw
    env_file:
      - ./services/id-service/.env
    environment:
      - HOST=0.0.0.0
      - DB_HOST=postgres
      - DB_PORT=5432
    depends_on:
      - db

  ai-agent-service:
    build:
      context: .
      dockerfile: services/ai-agent-service/Dockerfile
    networks:
      - backend-nw
    env_file:
      - ./services/ai-agent-service/.env
    environment:
      - HOST=0.0.0.0

networks:
  frontend-nw:
    driver: bridge
  backend-nw:
    driver: bridge

volumes:
  postgres_data:
