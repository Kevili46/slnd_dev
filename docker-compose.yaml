services:
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - api-gateway

  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    ports:
      - "4600:4600"
    env_file:
      - ./services/api-gateway/.env
    environment:
      - HOST=0.0.0.0
      - ID_SERVICE_URL=http://id-service:4601
      - AI_AGENT_SERVICE_URL=http://ai-agent-service:4602
    depends_on:
      - id-service
      - ai-agent-service

  id-service:
    build:
      context: .
      dockerfile: ./services/id-service/Dockerfile
    ports:
      - "4601:4601"
    env_file:
      - ./services/id-service/.env
    environment:
      - HOST=0.0.0.0

  ai-agent-service:
    build:
      context: .
      dockerfile: ./services/ai-agent-service/Dockerfile
    ports:
      - "4602:4602"
    env_file:
      - ./services/ai-agent-service/.env
    environment:
      - HOST=0.0.0.0
