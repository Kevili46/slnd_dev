<h3>{{skillCategory().title}}</h3>
<div class="skills">
    @for (skill of skillCategory().skills; track skill) {
    <div class="skill">
        <img [src]="skill.logo" [class.inverse]="darkMode() && skill.inverseLogo" alt="{{skill.name}} icon">
        <span>{{skill.name}}</span>
    </div>
    }
</div>
