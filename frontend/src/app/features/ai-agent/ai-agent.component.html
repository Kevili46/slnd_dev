<slnd-button class="toggle-button" raised [icon]="ICON.CHAT" (btnClick)="toggleAgent()"></slnd-button>
<div #agent class="agent" [class.slnd-bubble-back]="!mobile()">
    <div class="chat-head">
        <div class="chat-profile">
            <img class="profile-img" src="/assets/img/kevin_portrait.jpg" alt="">
            <div class="chat-info">
                <p class="service-indicator" [class.online]="online()">{{online() ? 'Online' : 'Offline'}}</p>
                <p class="ai-agent-info">Answers generated by Google Gemini. <br>Don't share private informations.</p>
            </div>
        </div>
        <slnd-button [btnDisabled]="!agentOpen()" class="close-button" (btnClick)="toggleAgent()" [icon]="ICON.CLOSE"
            iconWidth="1.2em"></slnd-button>
    </div>

    <slnd-chat-history></slnd-chat-history>

    <form (submit)="submitQuery()">
        <input #queryInput name="query" [disabled]="!online()" [(ngModel)]="query" type="text"
            placeholder="write a message" autocomplete="off">
        <slnd-button btnType="submit" [icon]="ICON.PLANE" iconWidth="1.5em"
            [btnDisabled]="submitDisabled()"></slnd-button>
    </form>
</div>
