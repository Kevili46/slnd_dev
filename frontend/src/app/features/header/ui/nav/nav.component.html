<nav id="main-nav" [class.open]="menuOpen()">
    <slnd-button raised [icon]="!menuOpen() ? ICON.MENU : ICON.CLOSE" (btnClick)="toggleMenu()"
        class="toggle-menu"></slnd-button>
    <ul>
        @for(navRoute of mainNavRoutes(); track $index) {
        <slnd-nav-item [mainNav]="true" [navRoute]="navRoute"></slnd-nav-item>
        }
    </ul>
</nav>
