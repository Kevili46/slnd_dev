<div class="reference-info">
    <h3>{{reference().name}}</h3>
    <span>{{reference().description}}</span>
</div>
<img [src]="reference().img" alt="Logo of the website of {{reference().name}}">
<div class="reference-tags">
    @for (tag of reference().tags; track $index) {
    <slnd-reference-tag [tag]="tag"></slnd-reference-tag>
    }
</div>
<a [href]="reference().link" target="_blank">
</a>
