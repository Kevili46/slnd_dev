<div class="list-reference-cell reference-name-cell">
    <h3>{{reference().name}}</h3>
</div>
<div class="list-reference-cell reference-description-cell">
    <span class="reference-description">{{reference().description}}</span>
</div>
<div class="list-reference-cell reference-tags-cell">
    <div class="reference-tags">
        @for(tag of reference().tags; track $index) {
        <slnd-reference-tag [tag]="tag"></slnd-reference-tag>
        }
    </div>
</div>
<div class="list-reference-cell reference-link-cell">
    <a class="slnd-link reference-link" [href]="reference().link" target="_blank">{{trimmedLink()}}</a>
</div>
