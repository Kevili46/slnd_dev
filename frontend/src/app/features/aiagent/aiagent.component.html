<div #agent class="agent">
    <div class="chat-head">
        <div>
            <p>Answers generated by Google Gemini.</p>
        </div>
        <button (click)="toggleAgent()">
            <slnd-icon class="close-icon" [icon]="ICON.CLOSE"></slnd-icon>
        </button>
    </div>
    <slnd-chat-history></slnd-chat-history>
    <form (submit)="submitQuery()">
        <input #queryInput name="query" [(ngModel)]="query" type="text" placeholder="write a message"
            autocomplete="off">
        <button [disabled]="submitDisabled()" type="submit">
            <slnd-icon class="submit-icon" [icon]="ICON.PLANE"></slnd-icon>
        </button>
    </form>
</div>
<div role="button" class="toggle-agent" (click)="toggleAgent()">
    <slnd-icon width="30px" [icon]="ICON.CHAT"></slnd-icon>
</div>
