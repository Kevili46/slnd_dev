<slnd-highlight-heading heading="Get in touch." stringToHighlight="touch."></slnd-highlight-heading>
<section>
    <div class="contacts slnd-bubble-back">
        @for(contact of contacts(); track $index) {
        <div class="contact">
            @if(contact.logo; as logo) {
            <img class="contact-img" [class.inverse-logo]="contact.inverseLogo && darkMode()" [src]="logo">
            }
            @if(contact.icon; as icon) {
            <slnd-icon class="contact-img" width="" [icon]="icon"></slnd-icon>
            }
            <a class="contact-link" target="_blank" [href]="contact.link"></a>
        </div>
        }
    </div>
</section>
