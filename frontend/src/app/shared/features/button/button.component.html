<button [disabled]="btnDisabled()" (click)="execute()" [attr.type]="btnType() ?? null">
    @if(text(); as text) {
    {{text}}
    }
    @if(icon(); as icon) {
    <slnd-icon [width]="inputIconWidth()" [icon]="icon"></slnd-icon>
    }
</button>
@if(activeUrl() != undefined) {
<a [routerLink]="activeUrl()"></a>
}
